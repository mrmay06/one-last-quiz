name: Daily Video Generation

on:
  schedule:
    # 2:00 AM IST = 20:30 UTC previous day
    - cron: '30 20 * * *'
    # 6:30 AM IST = 01:00 UTC same day
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci || npm install

      - name: Install Chrome (for Remotion)
        working-directory: remotion
        run: npx remotion browser ensure

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          FACEBOOK_ENABLED: ${{ secrets.FACEBOOK_ENABLED }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: python -m src.orchestrator

      - name: Commit puzzle log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/used_puzzles.json data/last_template.txt data/errors.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "log: video generated [skip ci]"
          git push || true
